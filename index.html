<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Layer Cam</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --text: #1e293b;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* Container Kamera & Foto dengan Rasio Presisi 9:16 */
        .cam-container {
            position: relative;
            width: 100%;
            max-width: 340px;
            aspect-ratio: 9 / 16;
            background-color: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid var(--card-color);
        }

        /* Layer 1: Kamera */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Mirroring untuk kamera depan agar natural */
        video.mirror {
            transform: scaleX(-1);
        }

        /* Layer Alternatif: Untuk menampung foto diam (freeze) hasil capture ATAU upload galeri */
        #user-photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
        }

        /* Mirroring hasil capture kamera depan agar konsisten dengan live view */
        #user-photo.mirror {
            transform: scaleX(-1);
        }

        /* Layer 2: Template PNG Overlay */
        .template-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        /* Kontrol & Tombol */
        .controls {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            background-color: var(--card-color);
            color: var(--text);
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-success {
            background-color: var(--success);
            color: white;
            border: none;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
            border: none;
        }

        /* Sembunyikan input asli */
        input[type="file"] {
            display: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>PNG Layer Cam</h1>
        <p>Clean. Modern. Precision.</p>
    </header>

    <div class="cam-container">
        <video id="video" autoplay playsinline class="mirror"></video>
        <img id="user-photo" alt="Foto Pengguna / Freeze Cam">
        <img id="overlay" class="template-overlay" src="" alt="Template Twibbon">
    </div>

    <div class="controls">
        <input type="file" id="template-input" accept="image/png">
        <input type="file" id="photo-input" accept="image/*">
        
        <div class="btn-group" id="upload-group">
            <button class="btn" onclick="document.getElementById('template-input').click()">
                📁 Template PNG
            </button>
            <button class="btn" onclick="document.getElementById('photo-input').click()">
                🖼️ Upload Foto
            </button>
        </div>

        <div class="btn-group" id="camera-controls">
            <button class="btn" id="flip-btn">
                🔄 Putar Kamera
            </button>
            <button class="btn btn-primary" id="capture-btn" disabled>
                📸 Ambil Foto
            </button>
        </div>

        <div class="btn-group" id="after-capture-controls" style="display: none;">
            <button class="btn btn-danger" id="reset-btn">
                🔄 Ambil Ulang
            </button>
            <button class="btn btn-success" id="download-btn">
                📥 Simpan ke Galeri
            </button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const userPhoto = document.getElementById('user-photo');
        const overlay = document.getElementById('overlay');
        
        const templateInput = document.getElementById('template-input');
        const photoInput = document.getElementById('photo-input');
        
        const flipBtn = document.getElementById('flip-btn');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        const cameraControls = document.getElementById('camera-controls');
        const afterCaptureControls = document.getElementById('after-capture-controls');
        const uploadGroup = document.getElementById('upload-group');
        
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFacingMode = "user"; // "user" = kamera depan, "environment" = kamera belakang
        let templateImage = null;
        let isUsingCamera = true;
        let capturedBlobURL = null; // Menyimpan foto freeze agar bisa ditampilkan & di-reset

        // 1. Jalankan Kamera
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            if (useFacingMode === "user") {
                video.classList.add('mirror');
                userPhoto.classList.add('mirror');
            } else {
                video.classList.remove('mirror');
                userPhoto.classList.remove('mirror');
            }

            try {
                const constraints = {
                    video: {
                        facingMode: useFacingMode,
                        width: { ideal: 1080 },
                        height: { ideal: 1920 },
                        aspectRatio: 9/16
                    },
                    audio: false
                };
                
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.display = 'block';
                userPhoto.style.display = 'none';
                isUsingCamera = true;
                
                // Kembalikan tampilan tombol ke mode kamera aktif
                cameraControls.style.display = 'flex';
                uploadGroup.style.display = 'flex';
                afterCaptureControls.style.display = 'none';
            } catch (err) {
                console.error("Gagal memuat kamera: ", err);
            }
        }

        // Mulai kamera pertama kali
        startCamera();

        // 2. Putar Kamera
        flipBtn.addEventListener('click', () => {
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            startCamera();
        });

        // 3. Upload Template PNG
        templateInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    overlay.src = event.target.result;
                    overlay.style.display = 'block';
                    
                    templateImage = new Image();
                    templateImage.src = event.target.result;
                    templateImage.onload = () => {
                        captureBtn.disabled = false;
                    };
                }
                reader.readAsDataURL(file);
            }
        });

        // 4. Upload Foto dari Galeri (Sama seperti freeze cam)
        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    stopCameraTracks();
                    video.style.display = 'none';
                    
                    userPhoto.src = event.target.result;
                    userPhoto.classList.remove('mirror'); // Foto galeri tidak perlu di-mirror
                    userPhoto.style.display = 'block';
                    isUsingCamera = false;

                    showFreezeControls();
                };
                reader.readAsDataURL(file);
            }
        });

        function stopCameraTracks() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        function showFreezeControls() {
            cameraControls.style.display = 'none';
            uploadGroup.style.display = 'none';
            afterCaptureControls.style.display = 'flex';
        }

        // 5. Ambil Foto (Freeze Kamera Seketika)
        captureBtn.addEventListener('click', () => {
            if (!isUsingCamera) return;

            // Buat canvas sementara untuk mengambil gambar dari video yang sedang aktif
            const tempCanvas = document.createElement('canvas');
            const videoRatio = video.videoWidth / video.videoHeight;
            const w = 1080;
            const h = 1920;
            tempCanvas.width = w;
            tempCanvas.height = h;
            const ctx = tempCanvas.getContext('2d');

            // Cermin jika menggunakan kamera depan
            if (useFacingMode === "user") {
                ctx.translate(w, 0);
                ctx.scale(-1, 1);
            }

            // Hitung crop agar pas di frame 9:16
            let drawWidth = w;
            let drawHeight = h;
            let offsetX = 0;
            let offsetY = 0;

            if (videoRatio > (9/16)) {
                drawWidth = h * videoRatio;
                offsetX = (w - drawWidth) / 2;
            } else {
                drawHeight = w / videoRatio;
                offsetY = (h - drawHeight) / 2;
            }

            ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);

            // Ubah hasil canvas menjadi URL gambar sementara (blob)
            tempCanvas.toBlob((blob) => {
                capturedBlobURL = URL.createObjectURL(blob);
                
                // Tampilkan gambar beku ke layar menggantikan video live
                userPhoto.src = capturedBlobURL;
                userPhoto.style.display = 'block';
                video.style.display = 'none';
                
                // Matikan kamera agar hemat baterai & tidak aktif di background
                stopCameraTracks();
                
                // Tampilkan tombol "Simpan ke Galeri" dan "Ambil Ulang"
                showFreezeControls();
            }, 'image/jpeg', 0.95);
        });

        // 6. Proses Pembuatan File Akhir yang Digabung dengan Template
        function generateFinalImage(callback) {
            canvas.width = 1080;
            canvas.height = 1920;
            const ctx = canvas.getContext('2d');

            const bgImage = new Image();
            bgImage.src = userPhoto.src;
            bgImage.onload = () => {
                // Gambar foto background (sudah beku / di-upload)
                // Jika kamera depan, kita sesuaikan mirror-nya agar pas dengan tampilan preview
                if (isUsingCamera && useFacingMode === "user") {
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
                    ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset
                } else {
                    ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
                }

                // Gambar template PNG di atasnya
                if (templateImage) {
                    ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);
                }
                
                callback();
            };
        }

        // 7. Simpan Hasil Akhir ke Galeri
        downloadBtn.addEventListener('click', () => {
            generateFinalImage(() => {
                const dataURL = canvas.toDataURL('image/jpeg', 0.95);
                const link = document.createElement('a');
                link.download = `PNG_Layer_Cam_${Date.now()}.jpg`;
                link.href = dataURL;
                link.click();
            });
        });

        // 8. Ambil Ulang (Reset & Hidupkan Kembali Kamera)
        resetBtn.addEventListener('click', () => {
            // Hapus URL blob sementara untuk membersihkan memori HP
            if (capturedBlobURL) {
                URL.revokeObjectURL(capturedBlobURL);
                capturedBlobURL = null;
            }
            userPhoto.src = "";
            userPhoto.style.display = 'none';
            startCamera(); // Jalankan kembali kamera live stream
        });
    </script>
</body>
</html>
