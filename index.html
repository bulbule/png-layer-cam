<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Layer Cam</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1e293b;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Kamera Container dengan Rasio 9:16 */
        .cam-container {
            position: relative;
            width: 100%;
            max-width: 360px; /* Ukuran ideal layar HP */
            aspect-ratio: 9 / 16;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 4px solid var(--card-color);
        }

        /* Layer 1: Kamera Video */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek mirror agar natural bagi pengguna */
        }

        /* Layer 2: Template PNG Overlay */
        .template-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Klik tembus ke video */
            z-index: 10;
            display: none;
        }

        /* Kontrol & Tombol */
        .controls {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            background-color: var(--card-color);
            color: var(--text);
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Sembunyikan input file asli, diganti tombol custom */
        #file-input {
            display: none;
        }

        /* Canvas tersembunyi untuk proses penggabungan gambar */
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>PNG Layer Cam</h1>
        <p>Clean. Modern. Precision.</p>
    </header>

    <div class="cam-container">
        <video id="video" autoplay playsinline></video>
        <img id="overlay" class="template-overlay" src="" alt="Template Twibbon">
    </div>

    <div class="controls">
        <input type="file" id="file-input" accept="image/png">
        
        <button class="btn" onclick="document.getElementById('file-input').click()">
            📁 Unggah Template PNG
        </button>

        <div class="btn-group">
            <button class="btn btn-primary" id="capture-btn" disabled>
                📸 Ambil Foto
            </button>
            <button class="btn" id="download-btn" style="display: none; background-color: #10b981; color: white; border: none;">
                📥 Simpan ke Galeri
            </button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const fileInput = document.getElementById('file-input');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const canvas = document.getElementById('canvas');
        let templateImage = null;

        // 1. Mengaktifkan Kamera HP secara otomatis (Prioritas kamera belakang/depan yang pas)
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user", // Gunakan "environment" jika ingin kamera belakang secara default
                aspectRatio: 9/16 
            }, 
            audio: false 
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            alert("Gagal mengakses kamera: " + err.message);
        });

        // 2. Menangani Proses Upload Template PNG
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    overlay.src = event.target.result;
                    overlay.style.display = 'block';
                    
                    // Simpan data image untuk proses canvas nanti
                    templateImage = new Image();
                    templateImage.src = event.target.result;
                    templateImage.onload = () => {
                        captureBtn.disabled = false; // Aktifkan tombol capture setelah template siap
                    };
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. Mengambil Foto & Menggabungkan Layer
        captureBtn.addEventListener('click', () => {
            // Atur ukuran canvas sesuai rasio 9:16 standar tinggi (misal 1080x1920 untuk hasil tajam)
            const width = 1080;
            const height = 1920;
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');

            // Gambar Layer 1: Kamera (di-mirror agar sesuai dengan preview)
            ctx.translate(width, 0);
            ctx.scale(-1, 1);
            
            // Kalkulasi pemotongan video agar pas di center rasio 9:16
            const videoRatio = video.videoWidth / video.videoHeight;
            let drawWidth = width;
            let drawHeight = height;
            let offsetX = 0;
            let offsetY = 0;

            // Efek cover video ke canvas
            if (videoRatio > (9/16)) {
                drawWidth = height * videoRatio;
                offsetX = (width - drawWidth) / 2;
            } else {
                drawHeight = width / videoRatio;
                offsetY = (height - drawHeight) / 2;
            }

            ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
            
            // Reset transformasi mirror untuk layer template
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            // Gambar Layer 2: Template PNG
            if (templateImage) {
                ctx.drawImage(templateImage, 0, 0, width, height);
            }

            // Tampilkan tombol unduh
            downloadBtn.style.display = 'flex';
            downloadBtn.innerText = "📥 Simpan ke Galeri";
        });

        // 4. Download Hasil Akhir
        downloadBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `PNG_Layer_Cam_${Date.now()}.jpg`;
            link.href = dataURL;
            link.click();
        });
    </script>
</body>
</html>
